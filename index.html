<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<title>Liga Do Junior Manager</title>
<style>
body{margin:0;font-family:monospace;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);color:white;text-align:center}
.hidden{display:none}
.card{background:rgba(0,0,0,0.45);padding:20px;border-radius:15px;width:95%;max-width:900px;margin:20px auto;box-shadow:0 0 25px rgba(0,0,0,0.7)}
button{padding:10px 20px;margin:8px;font-size:16px;cursor:pointer;border:none;border-radius:8px;background:#f7b733;color:#000;font-weight:bold;transition:0.3s}
button:hover{transform:scale(1.08);background:#ffd76a}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{padding:6px;border-bottom:1px solid rgba(255,255,255,0.2)}
.gold{color:gold;font-weight:bold}
.red{color:#ff6b6b}
.green{color:#6bff95}
</style>
</head>
<body><div id="menu" class="card">
<h1>⚽ Liga Do Junior Manager</h1>
<button onclick="startGame()">▶ Nueva Temporada</button>
<button onclick="openSettings()">⚙ Settings</button>
</div><div id="settings" class="card hidden">
<h2>Configuración</h2>
<label>Velocidad:</label>
<select id="speed">
<option value="800">Normal</option>
<option value="400">Rápida</option>
<option value="150">Ultra</option>
</select>
<br>
<button onclick="closeSettings()">Volver</button>
</div><div id="game" class="hidden">
<div class="card">
<h2>📅 Fecha <span id="round">1</span></h2>
<div id="fixtures"></div>
<button onclick="simulateRound()">Simular Fecha</button>
</div><div class="card">
<h2>🏆 Tabla Primera</h2>
<table><thead><tr><th>Equipo</th><th>Pts</th></tr></thead><tbody id="table1"></tbody></table>
</div><div class="card">
<h2>⬇ Descenso / Promoción</h2>
<div id="relegation"></div>
</div><div class="card">
<h2>🏆 B Nacional</h2>
<table><thead><tr><th>Equipo</th><th>Pts</th></tr></thead><tbody id="table2"></tbody></table>
</div><div class="card">
<h2>📰 Noticias</h2>
<div id="news"></div>
</div><button onclick="goMenu()">Salir</button>

</div><script>
let speed=800;
let round=1;
let userTeam="La 23";

let primera=["La 23","Los Tigres","Sporting","La Rivera","El Plan","Sol de América"];
let bNacional=["Güemes","Capital","Persa FC","La Arboledad","Unión Hurlingham","San José"];

let tabla1=[];
let tabla2=[];

function resetSeason(){
tabla1=primera.map(t=>({name:t,pts:0}));
tabla2=bNacional.map(t=>({name:t,pts:0}));
round=1;
}

function renderTables(){
tabla1.sort((a,b)=>b.pts-a.pts);
tabla2.sort((a,b)=>b.pts-a.pts);

document.getElementById("table1").innerHTML=tabla1.map((t,i)=>
`<tr><td class="${i==0?"gold":""} ${i>=tabla1.length-2?"red":""}">${t.name}</td><td>${t.pts}</td></tr>`).join("");

document.getElementById("table2").innerHTML=tabla2.map((t,i)=>
`<tr><td class="${i==0?"green":""}">${t.name}</td><td>${t.pts}</td></tr>`).join("");

updateRelegation();
}

function updateRelegation(){
let descenso=tabla1.slice(-2).map(t=>t.name);
let promoPrimera=tabla1[tabla1.length-3].name;
let promoBN=tabla2[2]?tabla2[2].name:"-";

document.getElementById("relegation").innerHTML=
`Descensos directos: ${descenso.join(", ")}<br>
Promoción: ${promoPrimera} vs ${promoBN}`;
}

function generateFixtures(teams){
let shuffled=[...teams].sort(()=>Math.random()-0.5);
let matches=[];
for(let i=0;i<shuffled.length;i+=2){
matches.push([shuffled[i],shuffled[i+1]]);
}
return matches;
}

function simulateLeague(tabla){
let matches=generateFixtures(tabla.map(t=>t.name));
let results="";

matches.forEach(m=>{
let g1=Math.floor(Math.random()*4);
let g2=Math.floor(Math.random()*4);
let t1=tabla.find(t=>t.name===m[0]);
let t2=tabla.find(t=>t.name===m[1]);

if(g1>g2)t1.pts+=3;
else if(g2>g1)t2.pts+=3;
else{t1.pts++;t2.pts++;}

results+=`⚽ ${m[0]} ${g1}-${g2} ${m[1]}<br>`;
});
return results;
}

function simulateRound(){
document.getElementById("round").innerText=round;

let res1=simulateLeague(tabla1);
let res2=simulateLeague(tabla2);

let important="";
if(res1.includes(userTeam)) important="🔥 Partido de "+userTeam+" destacado";

document.getElementById("news").innerHTML=important+"<br><br>"+res1+"<br>--- B Nacional ---<br>"+res2;

round++;
renderTables();
}

function startGame(){
resetSeason();
document.getElementById("menu").classList.add("hidden");
document.getElementById("game").classList.remove("hidden");
renderTables();
}

function goMenu(){
document.getElementById("game").classList.add("hidden");
document.getElementById("menu").classList.remove("hidden");
}

function openSettings(){
document.getElementById("menu").classList.add("hidden");
document.getElementById("settings").classList.remove("hidden");
}

function closeSettings(){
speed=parseInt(document.getElementById("speed").value);
document.getElementById("settings").classList.add("hidden");
document.getElementById("menu").classList.remove("hidden");
}
</script></body>
</html>

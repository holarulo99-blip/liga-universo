<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Liga 0.4.6</title>
<style>
body{margin:0;font-family:Arial;background:#111;color:white;text-align:center}
button{padding:10px 20px;margin:5px;font-size:16px;border:none;border-radius:8px;background:#222;color:white}
.container{padding:10px}
.hidden{display:none}
table{width:100%;font-size:12px}
th,td{padding:4px}
.gold{color:gold;font-weight:bold;font-size:22px}
</style>
</head>
<body>

<div id="tabla" class="container">
<h2>🏆 Liga Argentina - Fecha <span id="fechaActual">1</span></h2>
<div id="tablaContenido"></div>
<button onclick="verCalendario()">📅 Calendario</button>
</div>

<div id="calendario" class="container hidden">
<h2>📅 Calendario</h2>
<div id="partidos"></div>
<button onclick="volverTabla()">⬅ Volver</button>
</div>

<div id="simulacion" class="container hidden">
<h2 id="matchTitle"></h2>
<h1 id="resultado">0 - 0</h1>
<button onclick="volverTabla()">Volver</button>
</div>

<div id="campeon" class="container hidden">
<h1 class="gold">🏆 CAMPEÓN 🏆</h1>
<h2 id="nombreCampeon"></h2>
<button onclick="reiniciarLiga()">🔄 Reiniciar Liga</button>
</div>

<script>
let equipos=[
"La 23","Los Tigres","Sporting","Sol de América","Deportivo América",
"La Riveira","Los Verdes","Los Azules","Matadores","El Plan",
"Ntv","Psa","El Zondas","San Miguel Jrs","Güemes"
];

let data=equipos.map(nombre=>({
nombre,
pj:0,g:0,e:0,p:0,gf:0,gc:0,pts:0,moral:50
}));

let fecha=1;

function ordenarTabla(){
data.sort((a,b)=>b.pts-a.pts|| (b.gf-b.gc)-(a.gf-a.gc));
}

function renderTabla(){
ordenarTabla();
let html="<table border='1'><tr><th>Equipo</th><th>PJ</th><th>PTS</th><th>DG</th><th>Moral</th></tr>";
data.forEach(eq=>{
let dg=eq.gf-eq.gc;
let estado="🙂";
if(eq.moral>=90)estado="🔥";
else if(eq.moral<30)estado="💀";
html+=`<tr>
<td>${eq.nombre}</td>
<td>${eq.pj}</td>
<td>${eq.pts}</td>
<td>${dg}</td>
<td>${eq.moral}% ${estado}</td>
</tr>`;
});
html+="</table>";
document.getElementById("tablaContenido").innerHTML=html;
document.getElementById("fechaActual").innerText=fecha;
}

function verCalendario(){
document.getElementById("tabla").classList.add("hidden");
document.getElementById("calendario").classList.remove("hidden");
generarPartidos();
}

function volverTabla(){
document.getElementById("calendario").classList.add("hidden");
document.getElementById("simulacion").classList.add("hidden");
document.getElementById("tabla").classList.remove("hidden");
renderTabla();
}

function generarPartidos(){
let html="";
for(let i=0;i<data.length;i+=2){
if(data[i+1]){
html+=`${data[i].nombre} vs ${data[i+1].nombre}
<button onclick="simular(${i},${i+1})">Simular</button><br><br>`;
}
}
document.getElementById("partidos").innerHTML=html;
}

function simular(i,j){
let a=data[i];
let b=data[j];

let golesA=Math.floor(Math.random()*3);
let golesB=Math.floor(Math.random()*3);

a.pj++; b.pj++;
a.gf+=golesA; b.gf+=golesB;
a.gc+=golesB; b.gc+=golesA;

if(golesA>golesB){
a.g++; a.pts+=3;
b.p++;
a.moral=Math.min(90,a.moral+5);
b.moral=Math.max(0,b.moral-5);
}else if(golesB>golesA){
b.g++; b.pts+=3;
a.p++;
b.moral=Math.min(90,b.moral+5);
a.moral=Math.max(0,a.moral-5);
}else{
a.e++; b.e++;
a.pts+=1; b.pts+=1;
}

document.getElementById("calendario").classList.add("hidden");
document.getElementById("simulacion").classList.remove("hidden");
document.getElementById("matchTitle").innerText=a.nombre+" vs "+b.nombre;
document.getElementById("resultado").innerText=golesA+" - "+golesB;

if(fecha>=15){
mostrarCampeon();
}else{
fecha++;
}
}

function mostrarCampeon(){
ordenarTabla();
document.getElementById("tabla").classList.add("hidden");
document.getElementById("simulacion").classList.add("hidden");
document.getElementById("campeon").classList.remove("hidden");
document.getElementById("nombreCampeon").innerText=data[0].nombre;
}

function reiniciarLiga(){
location.reload();
}

renderTabla();
</script>

</body>
</html>

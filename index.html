<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<title>Liga Do Junior Manager - Retro Serio</title>
<style>
body { margin:0; font-family: monospace; background:#0a1f3d; color:#fff; text-align:center; }
button { padding:12px 24px; margin:10px; font-size:18px; cursor:pointer; border:none; border-radius:6px; background:#3a5f9e; color:#fff; transition:0.3s; }
button:hover { background:#3a5f9e; color:gold; }
#menu, #juego { display:none; }
#resultados, #noticias, #tabla, #promocion, #copa { background:#1e3a6f; padding:10px; margin:10px auto; border-radius:8px; display:none; width:80%; text-align:left; border:2px solid #3a5f9e; overflow:hidden; }
.resultado-partido { margin:5px 0; }
.tu-partido { color:#0f0; font-weight:bold; }
.goleada { color:#f90; font-weight:bold; }
.lider { font-weight:bold; color:gold; animation: glow 1s infinite alternate; }
.ticker { display:inline-block; white-space: nowrap; overflow: hidden; }
.ticker span { display:inline-block; padding-left:100%; animation: scroll 10s linear infinite; }
@keyframes glow { from {text-shadow:0 0 5px gold;} to {text-shadow:0 0 15px gold;} }
@keyframes scroll { 0%{transform:translateX(100%);} 100%{transform:translateX(-100%);} }
h1, h2, h3 { color:gold; }
</style>
</head>
<body>
<div id="menu">
<h1 style="animation: glow 2s infinite alternate;">Liga Do Junior Manager</h1>
<button onclick="startJuego()">▶ Play</button>
<button onclick="alert('Settings en desarrollo')">⚙ Settings</button>
<button onclick="alert('Idioma en desarrollo')">🌐 Idioma</button>
</div><div id="juego">
<h2>Liga Do Junior Manager - Retro Serio</h2>
<label>Tu equipo Primera: <input id="tuPrimera" value="La 23"></label>
<label>Tu equipo B Nacional: <input id="tuBN" value="Güemes"></label><br>
<button onclick="simularFecha()">Simular Fecha</button>
<div id="resultados"></div>
<div id="copa"></div>
<div id="noticias"></div>
<div id="tabla"></div>
<div id="promocion"></div>
</div><script>
// Mostrar menú al cargar
document.getElementById('menu').style.display='block';

function startJuego(){
  document.getElementById('menu').style.display='none';
  document.getElementById('juego').style.display='block';
}

// Equipos reales y coherentes
const primera = ["La 23","Los Tigres","Sporting","La Riveira","Sol de América","Deportivo América","Garrablanca","El Plan","River Plate","Independiente","Boca Juniors","Racing","San Lorenzo","Huracán","Vélez","Lanús"];
const bnacional = ["Güemes","Capital","Persa FC","La Arboledad","Carrefourt","Unión Infantil","Unión Hurlingham","Celestial","La Base","El Gol","Sevilla","San Ciro","El Fortín","San José","Deportivo Motores","Deportivo Morón"];

let moralPrimera = {}, moralBN = {}, tablaPrimera = {}, tablaBN = {};

function initTablas() {
  primera.forEach(e=>{moralPrimera[e]=50; tablaPrimera[e]={p:0,gf:0,gc:0,dif:0};});
  bnacional.forEach(e=>{moralBN[e]=50; tablaBN[e]={p:0,gf:0,gc:0,dif:0};});
}

function generarPartidos(equipos, tuEquipo){
  let copia = [...equipos];
  let partidos = [];
  while(copia.length>0){
    let e1 = copia.shift();
    if(e1===tuEquipo){
      let e2 = copia[Math.floor(Math.random()*copia.length)];
      copia.splice(copia.indexOf(e2),1);
      partidos.push({e1,e2,tu:true});
    } else {
      if(copia.length===0) break;
      let e2 = copia.shift();
      partidos.push({e1,e2,tu:false});
    }
  }
  return partidos;
}

function simularPartido(e1,e2,tu,moral,tabla){
  let mod1 = Math.floor(Math.random()*6)+Math.floor(moral[e1]/20);
  let mod2 = Math.floor(Math.random()*6)+Math.floor(moral[e2]/20);
  tabla[e1].gf+=mod1; tabla[e1].gc+=mod2;
  tabla[e2].gf+=mod2; tabla[e2].gc+=mod1;
  tabla[e1].dif = tabla[e1].gf-tabla[e1].gc;
  tabla[e2].dif = tabla[e2].gf-tabla[e2].gc;
  if(mod1>mod2){tabla[e1].p+=3; moral[e1]+=1; moral[e2]-=1;}
  else if(mod2>mod1){tabla[e2].p+=3; moral[e2]+=1; moral[e1]-=1;}
  else {tabla[e1].p+=1; tabla[e2].p+=1;}
  return {mod1,mod2};
}

function simularFecha(){
  initTablas();
  let tuPrimera = document.getElementById('tuPrimera').value;
  let tuBN = document.getElementById('tuBN').value;
  
  let resHTML = '<h2>📅 Resultados de la jornada - Primera División</h2>';
  let noticiasHTML = '<h3>📰 Noticias importantes</h3>';
  let copaHTML = '<h3>🏆 Copa Argentina</h3>';

  let partidosPrimera = generarPartidos(primera, tuPrimera);
  partidosPrimera.forEach(p=>{
    let r = simularPartido(p.e1,p.e2,p.tu,moralPrimera,tablaPrimera);
    let clase = p.tu?'tu-partido':'', goleada = Math.abs(r.mod1-r.mod2)>=3?'goleada':'';
    resHTML += `<div class='resultado-partido ${clase} ${goleada}'>${p.e1} ${r.mod1}-${r.mod2} ${p.e2}</div>`;
    if(p.tu) noticiasHTML += `<span>⚽ Tu partido: ${p.e1} ${r.mod1}-${r.mod2} ${p.e2} • </span>`;
    if(goleada) noticiasHTML += `<span>🔥 Goleada: ${p.e1} ${r.mod1}-${r.mod2} ${p.e2} • </span>`;
  });

  let partidosBN = generarPartidos(bnacional, tuBN);
  partidosBN.forEach(p=>{
    let r = simularPartido(p.e1,p.e2,p.tu,moralBN,tablaBN);
    let clase = p.tu?'tu-partido':'', goleada = Math.abs(r.mod1-r.mod2)>=3?'goleada':'';
    resHTML += `<div class='resultado-partido ${clase} ${goleada}'>${p.e1} ${r.mod1}-${r.mod2} ${p.e2}</div>`;
    if(p.tu) noticiasHTML += `<span>⚽ Tu partido: ${p.e1} ${r.mod1}-${r.mod2} ${p.e2} • </span>`;
    if(goleada) noticiasHTML += `<span>🔥 Goleada: ${p.e1} ${r.mod1}-${r.mod2} ${p.e2} • </span>`;
  });

  // Copa Argentina simulada
  let equiposCopa = [primera[Math.floor(Math.random()*primera.length)], bnacional[Math.floor(Math.random()*bnacional.length)]];
  let rCopa = {mod1:Math.floor(Math.random()*6), mod2:Math.floor(Math.random()*6)};
  copaHTML += `<div>${equiposCopa[0]} ${rCopa.mod1}-${rCopa.mod2} ${equiposCopa[1]}</div>`;
  if(rCopa.mod1>rCopa.mod2) copaHTML += `<div class='lider'>🏆 Campeón Copa Argentina: ${equiposCopa[0]}</div>`;
  else if(rCopa.mod2>rCopa.mod1) copaHTML += `<div class='lider'>🏆 Campeón Copa Argentina: ${equiposCopa[1]}</div>`;

  document.getElementById('resultados').innerHTML=resHTML; document.getElementById('resultados').style.display='block';
  document.getElementById('copa').innerHTML=copaHTML; document.getElementById('copa').style.display='block';
  
  // Noticias ticker
  document.getElementById('noticias').innerHTML=`<div class='ticker'><span>${noticiasHTML}</span></div>`; document.getElementById('noticias').style.display='block';

  // Tabla simple
  let tablaHTML='<h3>📊 Tabla Primera División</h3>';
  Object.entries(tablaPrimera).sort((a,b)=>b[1].p-a[1].p).forEach(([eq,d])=>{
    let lider = d.p===Math.max(...Object.values(tablaPrimera).map(x=>x.p))?' lider':'';
    tablaHTML += `<div class='${lider}'>${eq}: ${d.p} pts GF:${d.gf} GC:${d.gc} DIF:${d.dif}</div>`;
  });
  tablaHTML+='<h3>📊 Tabla B Nacional</h3>';
  Object.entries(tablaBN).sort((a,b)=>b[1].p-a[1].p).forEach(([eq,d])=>{
    let lider = d.p===Math.max(...Object.values(tablaBN).map(x=>x.p))?' lider':'';
    tablaHTML += `<div class='${lider}'>${eq}: ${d.p} pts GF:${d.gf} GC:${d.gc} DIF:${d.dif}</div>`;
  });
  document.getElementById('tabla').innerHTML=tablaHTML; document.getElementById('tabla').style.display='block';
  
  // Promoción ejemplo
  document.getElementById('promocion').innerHTML=`<h3>⚔️ Promoción: Equipo14 vs 3° B Nacional</h3>Ida: 1-1<br>Vuelta: 0-2<br>Resultado global: 1-3 → B3 asciende`; document.getElementById('promocion').style.display='block';
}
</script></body>
</html>

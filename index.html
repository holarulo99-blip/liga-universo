<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<title>Liga Do Junior Manager - Demo</title>
<style>
body { background: #111; color: #eee; font-family: Arial, sans-serif; }
button { padding: 10px 20px; margin: 10px; font-size: 16px; cursor: pointer; }
#resultados, #noticias, #tabla, #promocion { background: #222; padding: 10px; margin: 10px; border-radius: 8px; display: none; }
.resultado-partido { margin: 5px 0; }
.tu-partido { color: #0f0; font-weight: bold; }
.goleada { color: #f90; font-weight: bold; }
.lider { font-weight: bold; color: gold; }
</style>
</head>
<body>
<h1>Liga Do Junior Manager - Demo 0.6</h1>
<label>Tu equipo Primera: <input id="tuPrimera" value="La 23"></label>
<label>Tu equipo B Nacional: <input id="tuBN" value="Güemes"></label><br>
<button onclick="simularFecha()">Simular Fecha</button>
<div id="resultados"></div>
<div id="noticias"></div>
<div id="tabla"></div>
<div id="promocion"></div><script>
const primera = ["La 23","Los Verdes","Sol de América","La Riveira","El Plan","Sporting","NTV","Matadores","Garrablanca","La Riveira2","Los Tigres","Deportivo América","River B","River C","Equipo15","Equipo16"];
const bnacional = ["Güemes","Capital","Persa FC","La Arboledad","Carrefourt","Unión Infantil","Unión Hurlingham","Celestial","La Base","El Gol","Sevilla","San Ciro","El Fortín","San José","Deportivo Motores","Deportivo Morón"];
let moralPrimera = {}, moralBN = {}, tablaPrimera = {}, tablaBN = {};

function initTablas() {
  primera.forEach(e=>{moralPrimera[e]=50; tablaPrimera[e]={p:0,gf:0,gc:0,dif:0};});
  bnacional.forEach(e=>{moralBN[e]=50; tablaBN[e]={p:0,gf:0,gc:0,dif:0};});
}

function generarPartidos(equipos, tuEquipo){
  let copia = [...equipos];
  let partidos = [];
  while(copia.length>0){
    let e1 = copia.shift();
    if(e1===tuEquipo){
      let e2 = copia[Math.floor(Math.random()*copia.length)];
      copia.splice(copia.indexOf(e2),1);
      partidos.push({e1,e2,tu:true});
    } else {
      if(copia.length===0) break;
      let e2 = copia.shift();
      partidos.push({e1,e2,tu:false});
    }
  }
  return partidos;
}

function simularPartido(e1,e2,tu,moral,tabla){
  let mod1 = Math.floor(Math.random()*6)+Math.floor(moral[e1]/20);
  let mod2 = Math.floor(Math.random()*6)+Math.floor(moral[e2]/20);
  tabla[e1].gf+=mod1; tabla[e1].gc+=mod2;
  tabla[e2].gf+=mod2; tabla[e2].gc+=mod1;
  tabla[e1].dif = tabla[e1].gf-tabla[e1].gc;
  tabla[e2].dif = tabla[e2].gf-tabla[e2].gc;
  if(mod1>mod2){tabla[e1].p+=3; moral[e1]+=1; moral[e2]-=1;}
  else if(mod2>mod1){tabla[e2].p+=3; moral[e2]+=1; moral[e1]-=1;}
  else {tabla[e1].p+=1; tabla[e2].p+=1;}
  return {mod1,mod2};
}

function simularFecha(){
  initTablas();
  let tuPrimera = document.getElementById('tuPrimera').value;
  let tuBN = document.getElementById('tuBN').value;
  
  let resHTML = '<h2>📅 Resultados de la jornada - Primera División</h2>';
  let noticiasHTML = '<h3>📰 Noticias importantes</h3>';
  let partidosPrimera = generarPartidos(primera, tuPrimera);
  partidosPrimera.forEach(p=>{
    let r = simularPartido(p.e1,p.e2,p.tu,moralPrimera,tablaPrimera);
    let clase = p.tu?'tu-partido':'', goleada = Math.abs(r.mod1-r.mod2)>=3?'goleada':'';
    resHTML += `<div class='resultado-partido ${clase} ${goleada}'>${p.e1} ${r.mod1}-${r.mod2} ${p.e2}</div>`;
    if(p.tu) noticiasHTML += `<div>⚽ Tu partido: ${p.e1} ${r.mod1}-${r.mod2} ${p.e2}</div>`;
    if(goleada) noticiasHTML += `<div>🔥 Goleada: ${p.e1} ${r.mod1}-${r.mod2} ${p.e2}</div>`;
  });
  
  resHTML += '<h2>📅 Resultados de la jornada - B Nacional</h2>';
  let partidosBN = generarPartidos(bnacional, tuBN);
  partidosBN.forEach(p=>{
    let r = simularPartido(p.e1,p.e2,p.tu,moralBN,tablaBN);
    let clase = p.tu?'tu-partido':'', goleada = Math.abs(r.mod1-r.mod2)>=3?'goleada':'';
    resHTML += `<div class='resultado-partido ${clase} ${goleada}'>${p.e1} ${r.mod1}-${r.mod2} ${p.e2}</div>`;
    if(p.tu) noticiasHTML += `<div>⚽ Tu partido: ${p.e1} ${r.mod1}-${r.mod2} ${p.e2}</div>`;
    if(goleada) noticiasHTML += `<div>🔥 Goleada: ${p.e1} ${r.mod1}-${r.mod2} ${p.e2}</div>`;
  });
  
  document.getElementById('resultados').innerHTML=resHTML; document.getElementById('resultados').style.display='block';
  document.getElementById('noticias').innerHTML=noticiasHTML; document.getElementById('noticias').style.display='block';
  
  // Tabla simple
  let tablaHTML='<h3>📊 Tabla Primera División</h3>';
  Object.entries(tablaPrimera).sort((a,b)=>b[1].p-a[1].p).forEach(([eq,d])=>{
    let lider = d.p===Math.max(...Object.values(tablaPrimera).map(x=>x.p))?' lider':'';
    tablaHTML += `<div class='${lider}'>${eq}: ${d.p} pts GF:${d.gf} GC:${d.gc} DIF:${d.dif}</div>`;
  });
  tablaHTML+='<h3>📊 Tabla B Nacional</h3>';
  Object.entries(tablaBN).sort((a,b)=>b[1].p-a[1].p).forEach(([eq,d])=>{
    let lider = d.p===Math.max(...Object.values(tablaBN).map(x=>x.p))?' lider':'';
    tablaHTML += `<div class='${lider}'>${eq}: ${d.p} pts GF:${d.gf} GC:${d.gc} DIF:${d.dif}</div>`;
  });
  document.getElementById('tabla').innerHTML=tablaHTML; document.getElementById('tabla').style.display='block';
  
  // Promoción ejemplo
  document.getElementById('promocion').innerHTML=`<h3>⚔️ Promoción: Equipo14 vs 3° B Nacional</h3>Ida: 1-1<br>Vuelta: 0-2<br>Resultado global: 1-3 → B3 asciende`; document.getElementById('promocion').style.display='block';
}
</script></body>
           </html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La 23 Manager 0.4.6</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
  text-align:center;
}
button{
  padding:10px;
  margin:10px;
  font-size:16px;
  border:none;
  border-radius:6px;
  background:#00aa55;
  color:white;
}
table{
  width:95%;
  margin:auto;
  border-collapse:collapse;
  font-size:12px;
}
th,td{
  border:1px solid #444;
  padding:4px;
}
</style>
</head>
<body>

<h2>LIGA 1RA DIVISIÓN</h2>
<p id="fecha">Fecha 1</p>
<button onclick="simularFecha()">Simular Fecha</button>

<table>
<thead>
<tr>
<th>Equipo</th><th>PJ</th><th>PG</th><th>PE</th><th>PP</th>
<th>GF</th><th>GC</th><th>PTS</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

<script>

let fechaActual = 1;

let equipos = [
"La 23","Los Tigres","Los Verdes","Sol de América","Deportivo América",
"La Riveira","Sporting","Los Azules","Matadores","El Plan",
"NTV","PSA","El Zondas","San Miguel Jrs","Güemes","La Pinta"
].map(nombre => ({
  nombre,
  pj:0, pg:0, pe:0, pp:0,
  gf:0, gc:0, pts:0,
  moral: Math.floor(Math.random()*81)+20
}));

function mostrarTabla(){
  equipos.sort((a,b)=> b.pts - a.pts || (b.gf-b.gc)-(a.gf-a.gc));
  let html="";
  equipos.forEach(e=>{
    html+=`<tr>
    <td>${e.nombre}</td>
    <td>${e.pj}</td>
    <td>${e.pg}</td>
    <td>${e.pe}</td>
    <td>${e.pp}</td>
    <td>${e.gf}</td>
    <td>${e.gc}</td>
    <td>${e.pts}</td>
    </tr>`;
  });
  document.getElementById("tabla").innerHTML=html;
}

function simularFecha(){

  if(fechaActual>15){
    alert("Temporada finalizada. Campeón: "+equipos[0].nombre);
    return;
  }

  for(let i=0;i<equipos.length;i+=2){

    let e1=equipos[i];
    let e2=equipos[i+1];

    let goles1=Math.floor(Math.random()*3 + e1.moral/50);
    let goles2=Math.floor(Math.random()*3 + e2.moral/50);

    e1.pj++; e2.pj++;
    e1.gf+=goles1; e1.gc+=goles2;
    e2.gf+=goles2; e2.gc+=goles1;

    if(goles1>goles2){
      e1.pg++; e1.pts+=3; e2.pp++;
      e1.moral+=2; e2.moral-=2;
    }
    else if(goles2>goles1){
      e2.pg++; e2.pts+=3; e1.pp++;
      e2.moral+=2; e1.moral-=2;
    }
    else{
      e1.pe++; e2.pe++;
      e1.pts+=1; e2.pts+=1;
    }

  }

  fechaActual++;
  document.getElementById("fecha").textContent="Fecha "+fechaActual;
  mostrarTabla();
}

mostrarTabla();

</script>

</body>
</html>

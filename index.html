<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Liga 0.4.7</title>
<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:white;text-align:center;transition:0.3s}
button{padding:10px 20px;margin:8px;font-size:16px;border:none;border-radius:8px;background:#1f1f1f;color:white;cursor:pointer}
button:hover{background:#333}
.screen{display:none;padding:20px}
.active{display:block}
h1,h2,h3{margin:10px}
.bar{height:15px;background:#333;border-radius:10px;overflow:hidden;margin:5px auto;width:80%}
.fill{height:100%;background:lime}
.danger{background:red}
.warning{background:orange}
table{width:100%;font-size:12px;margin-top:10px}
th,td{padding:4px}
.gold{color:gold;font-size:22px}
.arrow{font-size:24px;cursor:pointer;margin:0 20px}
.fade{animation:fade 0.5s}
@keyframes fade{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>

<!-- MENU -->
<div id="menu" class="screen active fade">
<h1>⚽ LIGA ARGENTINA</h1>
<button onclick="irElegir()">PLAY</button><br>
<button>SETTINGS</button><br>
<button>IDIOMA</button>
</div>

<!-- ELEGIR CLUB -->
<div id="elegir" class="screen fade">
<h2>Elegir Club</h2>
<div>
<span class="arrow" onclick="cambiar(-1)">⬅</span>
<span id="clubNombre"></span>
<span class="arrow" onclick="cambiar(1)">➡</span>
</div>
<h3 id="clubPresupuesto"></h3>
<button onclick="confirmarClub()">Confirmar</button>
</div>

<!-- OBJETIVOS -->
<div id="objetivos" class="screen fade">
<h2>Objetivos de Temporada</h2>
<div id="textoObjetivo"></div>
<button onclick="iniciarLiga()">Comenzar Temporada</button>
</div>

<!-- LIGA -->
<div id="liga" class="screen fade">
<h2 id="infoClub"></h2>
<div>
Moral
<div class="bar"><div id="moralBar" class="fill"></div></div>
Confianza Junta
<div class="bar"><div id="confianzaBar" class="fill"></div></div>
</div>
<h3>Fecha <span id="fecha"></span></h3>
<button onclick="simularFecha()">Simular Partido</button>
<div id="resultado"></div>
<table border="1" id="tabla"></table>
</div>

<!-- DESPIDO -->
<div id="despedido" class="screen fade">
<h1>💼 Has sido despedido</h1>
<button onclick="resetear()">Volver al Menú</button>
</div>

<!-- CAMPEON -->
<div id="campeon" class="screen fade">
<h1 class="gold">🏆 CAMPEÓN 🏆</h1>
<h2 id="nombreCampeon"></h2>
<button onclick="resetear()">Nueva Temporada</button>
</div>

<script>
let equipos=["La 23","Los Tigres","Sporting","Sol de América","Deportivo América","La Riveira","Los Verdes","Los Azules","Matadores","El Plan","Ntv","Psa","El Zondas","San Miguel Jrs","Güemes"];
let presupuestos=[20,60,45,30,25,22,18,17,19,15,14,13,12,11,10];

let indice=0;
let clubActual=null;
let moral=50;
let confianza=70;
let fechaActual=1;

let tablaData=equipos.map(e=>({nombre:e,pj:0,pts:0,gf:0,gc:0}));

function mostrar(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function irElegir(){mostrar("elegir");actualizarClub();}

function cambiar(d){
indice=(indice+d+equipos.length)%equipos.length;
actualizarClub();
}

function actualizarClub(){
document.getElementById("clubNombre").innerText=equipos[indice];
document.getElementById("clubPresupuesto").innerText="Presupuesto: "+presupuestos[indice]+"M";
}

function confirmarClub(){
clubActual=equipos[indice];
localStorage.setItem("clubGuardado",clubActual);
mostrar("objetivos");
document.getElementById("textoObjetivo").innerHTML=
"Objetivo: Terminar Top 8<br>Mantener moral arriba de 40%";
}

function iniciarLiga(){
mostrar("liga");
document.getElementById("infoClub").innerText="Club: "+clubActual;
actualizarBarras();
actualizarTabla();
document.getElementById("fecha").innerText=fechaActual;
}

function actualizarBarras(){
let m=document.getElementById("moralBar");
m.style.width=moral+"%";
if(moral<30)m.className="fill danger";
else if(moral<50)m.className="fill warning";
else m.className="fill";

let c=document.getElementById("confianzaBar");
c.style.width=confianza+"%";
if(confianza<30)c.className="fill danger";
else if(confianza<50)c.className="fill warning";
else c.className="fill";
}

function simularFecha(){
if(fechaActual>15)return;

let goles=Math.floor(Math.random()*3);
let golesR=Math.floor(Math.random()*3);

tablaData.forEach(e=>{
if(e.nombre===clubActual){
e.pj++;
e.gf+=goles;
e.gc+=golesR;
if(goles>golesR){e.pts+=3;moral+=5;confianza+=5;}
else if(goles<golesR){moral-=7;confianza-=8;}
else{e.pts+=1;}
}
});

moral=Math.max(0,Math.min(90,moral));
confianza=Math.max(0,Math.min(100,confianza));

document.getElementById("resultado").innerText="Resultado: "+goles+" - "+golesR;

fechaActual++;
document.getElementById("fecha").innerText=fechaActual;

actualizarBarras();
actualizarTabla();

if(confianza<=0){mostrar("despedido");}
if(fechaActual>15){evaluarFinal();}
}

function actualizarTabla(){
tablaData.sort((a,b)=>b.pts-a.pts);
let html="<tr><th>Equipo</th><th>PJ</th><th>PTS</th></tr>";
tablaData.forEach(e=>{
html+=`<tr><td>${e.nombre}</td><td>${e.pj}</td><td>${e.pts}</td></tr>`;
});
document.getElementById("tabla").innerHTML=html;
}

function evaluarFinal(){
tablaData.sort((a,b)=>b.pts-a.pts);
if(tablaData[0].nombre===clubActual){
mostrar("campeon");
document.getElementById("nombreCampeon").innerText=clubActual;
}else{
if(confianza<40){mostrar("despedido");}
}
}

function resetear(){
localStorage.removeItem("clubGuardado");
location.reload();
}

window.onload=function(){
let guardado=localStorage.getItem("clubGuardado");
if(guardado){
clubActual=guardado;
mostrar("liga");
document.getElementById("infoClub").innerText="Club: "+clubActual;
actualizarBarras();
actualizarTabla();
document.getElementById("fecha").innerText=fechaActual;
}
};
</script>

</body>
  </html>
